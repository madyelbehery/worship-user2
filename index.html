<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>TRACKING</title>
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2904/2904975.png">

<style>
  body { 
    margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: #000; color: #fff; direction: rtl; overflow-x: hidden;
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  
  /* شاشة الدخول */
  #lockScreen {
    position: fixed; inset: 0; background: #000; z-index: 2000;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
  }
  .login-box { display: flex; flex-direction: column; gap: 12px; width: 250px; }
  #lockScreen input {
    padding: 15px; border-radius: 12px; border: 1px solid #333;
    background: #111; color: #fff; text-align: center; font-size: 16px; outline: none;
  }
  #lockScreen button {
    padding: 12px; border-radius: 10px; border: none;
    background: #4caf50; color: #000; font-weight: bold; cursor: pointer; font-size: 16px;
  }

  /* التنسيق الرئيسي للتقويم */
  .header { text-align: center; padding: 20px; font-size: 24px; font-weight: bold; color: #4caf50; }
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 10px; max-width: 450px; margin: 0 auto; }
  
  .day { 
    width: 45px; height: 45px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; 
    cursor: pointer; font-size: 16px; font-weight: bold; 
    transition: all 0.3s ease; border: 2px solid #222; position: relative; 
  }

  /* الإطار الأزرق للقرآن */
  .quran-border { border-color: #2196f3 !important; box-shadow: 0 0 10px #2196f3; }
  /* لون الرقم أحمر للعادة */
  .habit-active-text { color: #ff5252 !important; text-shadow: 0 0 5px rgba(255, 82, 82, 0.5); }

  .day.today { outline: 2px solid #fff; outline-offset: 3px; }

  /* الإحصائيات */
  .stats-container { max-width: 90%; margin: 20px auto; padding: 15px; background: #111; border-radius: 15px; border: 1px solid #222; }
  .stat-row { margin-bottom: 15px; }
  .stat-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; font-weight: bold; }
  .progress-bg { background: #222; height: 10px; border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; transition: width 0.6s ease; }
  .fill-prayer { background: linear-gradient(90deg, #2e7d32, #4caf50); }
  .fill-habit { background: linear-gradient(90deg, #c62828, #e53935); }

  /* Popup */
  .popup { 
    position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
    display: none; align-items: center; justify-content: center; 
    z-index: 1000; backdrop-filter: blur(8px); 
  }
  .popup-content { 
    background: #1a1a1a; padding: 20px; border-radius: 20px; 
    width: 85%; max-width: 300px; text-align: center; 
    display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; 
    border: 1px solid #333; animation: fadeIn 0.4s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

  .popup-circle { 
    width: 55px; height: 55px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; 
    cursor: pointer; font-size: 13px; background: #2a2a2a; color: #fff;
    transition: background 0.2s;
  }
  .popup-circle.active-prayer { background: #4caf50; color: #000; font-weight: bold; }
  .popup-circle.active-habit { background: #e53935; color: #fff; font-weight: bold; }

  /* قسم القرآن الجديد */
  .quran-section { width: 100%; background: #222; padding: 12px; border-radius: 15px; margin-top: 5px; border: 1px solid #2196f3; }
  .quran-section h4 { margin: 0 0 10px 0; font-size: 14px; color: #2196f3; }
  .quran-inputs { display: flex; gap: 5px; justify-content: center; }
  .quran-inputs input { width: 30%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; text-align: center; font-size: 12px; }

  .btn-save { 
    background: #4caf50; color: #000; width: 100%; padding: 14px; 
    border: none; border-radius: 12px; margin-top: 10px; 
    cursor: pointer; font-weight: bold; font-size: 16px;
  }
</style>
</head>
<body>

<div id="lockScreen">
  <div style="font-size:22px; color:#4caf50; font-weight:bold; margin-bottom:10px;">نظام المتابعة الخاص</div>
  <div class="login-box">
    <input type="text" id="userInput" placeholder="اسم المستخدم" autocomplete="off">
    <input type="password" id="passInput" placeholder="كلمة السر">
    <button onclick="checkLogin()">فتح النظام</button>
  </div>
  <div id="loginError" style="color:#e53935; font-size:14px; display:none; margin-top:10px;">⚠️ الخطأ في البيانات</div>
</div>

<div id="mainContent" style="display:none;">
  <div class="header" id="monthTitle"></div>
  <div class="calendar" id="calendar"></div>

  <div class="stats-container">
    <div class="stat-row">
      <div class="stat-label"><span>إنجاز الصلوات</span><span id="prayerPercent">0%</span></div>
      <div class="progress-bg"><div id="prayerBar" class="progress-fill fill-prayer" style="width: 0%"></div></div>
    </div>
    <div class="stat-row">
      <div class="stat-label"><span>الالتزام بالعادات</span><span id="habitPercent">0%</span></div>
      <div class="progress-bg"><div id="habitBar" class="progress-fill fill-habit" style="width: 0%"></div></div>
    </div>
  </div>

  <div class="popup" id="popup">
    <div class="popup-content" id="popupContent">
      <div id="popupDate" style="width:100%; margin-bottom:5px; font-size:16px; color:#4caf50; font-weight:bold;"></div>
      
      <div id="circlesArea" style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; width:100%;"></div>

      <div class="quran-section">
        <h4>📖 ورد القرآن الكريم</h4>
        <div class="quran-inputs">
          <input type="text" id="quranSurah" placeholder="السورة">
          <input type="number" id="quranFrom" placeholder="من">
          <input type="number" id="quranTo" placeholder="إلى">
        </div>
      </div>

      <button class="btn-save" onclick="saveAndClose()">حفظ وإغلاق</button>
    </div>
  </div>
</div>

<script>
const CORRECT_USER = "To", CORRECT_PASS = "123";
let currentOpenDate = "";

function checkLogin() {
  const user = document.getElementById("userInput").value;
  const pass = document.getElementById("passInput").value;
  if (user === CORRECT_USER && pass === CORRECT_PASS) {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    loadCalendar();
  } else {
    document.getElementById("loginError").style.display = "block";
  }
}

document.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkLogin(); });

const now = new Date(), year = now.getFullYear(), month = now.getMonth(), todayDate = now.getDate(), currentHour = now.getHours();
const prayerSchedule = [
  { key: "fajr", hour: 4, name: "فجر" }, { key: "zuhr", hour: 12, name: "ظهر" },
  { key: "asr", hour: 15, name: "عصر" }, { key: "maghrib", hour: 18, name: "مغرب" },
  { key: "isha", hour: 19, name: "عشاء" }
];

function getData(dateStr) {
  const saved = localStorage.getItem(dateStr);
  return saved ? JSON.parse(saved) : { prayer: {}, habit: false, quran: {s:"", f:"", t:""} };
}

function loadCalendar() {
  const cal = document.getElementById("calendar"), days = new Date(year, month + 1, 0).getDate();
  document.getElementById("monthTitle").innerText = now.toLocaleString("ar", { month: "long", year: "numeric" });
  cal.innerHTML = "";
  for (let d = 1; d <= days; d++) {
    const dStr = `d-${year}-${month+1}-${d}`, data = getData(dStr), div = document.createElement("div");
    div.className = "day"; div.innerText = d;
    if (d === todayDate) div.classList.add("today");
    
    let cols = [];
    prayerSchedule.forEach((p, i) => cols.push(`${data.prayer[p.key] ? "#4caf50" : "#222"} ${i*72}deg ${(i+1)*72}deg`));
    div.style.background = `conic-gradient(${cols.join(',')})`;
    
    if (data.quran && data.quran.s !== "") div.classList.add("quran-border");
    if (data.habit) div.classList.add("habit-active-text");
    
    div.onclick = () => openPopup(dStr, d);
    cal.appendChild(div);
  }
  updateStats();
}

function openPopup(dateStr, dNum) {
  currentOpenDate = dateStr;
  const data = getData(dateStr);
  document.getElementById("popupDate").innerText = `يوم ${dNum} ${now.toLocaleString("ar", {month: "long"})}`;
  
  const area = document.getElementById("circlesArea");
  area.innerHTML = "";
  
  prayerSchedule.forEach(p => {
    const b = document.createElement("div");
    b.className = "popup-circle" + (data.prayer[p.key] ? " active-prayer" : "");
    b.innerText = p.name;
    b.onclick = () => { data.prayer[p.key] = !data.prayer[p.key]; localStorage.setItem(dateStr, JSON.stringify(data)); openPopup(dateStr, dNum); };
    area.appendChild(b);
  });

  const hB = document.createElement("div");
  hB.className = "popup-circle" + (data.habit ? " active-habit" : "");
  hB.innerText = "عادة";
  hB.onclick = () => { data.habit = !data.habit; localStorage.setItem(dateStr, JSON.stringify(data)); openPopup(dateStr, dNum); };
  area.appendChild(hB);

  document.getElementById("quranSurah").value = data.quran?.s || "";
  document.getElementById("quranFrom").value = data.quran?.f || "";
  document.getElementById("quranTo").value = data.quran?.t || "";

  document.getElementById("popup").style.display = "flex";
}

function saveAndClose() {
  const data = getData(currentOpenDate);
  data.quran = {
    s: document.getElementById("quranSurah").value,
    f: document.getElementById("quranFrom").value,
    t: document.getElementById("quranTo").value
  };
  localStorage.setItem(currentOpenDate, JSON.stringify(data));
  document.getElementById("popup").style.display = "none";
  loadCalendar();
}

function updateStats() {
  let totalDue = 0, doneP = 0, doneH = 0;
  for (let d = 1; d <= todayDate; d++) {
    const data = getData(`d-${year}-${month+1}-${d}`);
    prayerSchedule.forEach(p => {
      if (d < todayDate || (d === todayDate && currentHour >= p.hour)) {
        totalDue++; if (data.prayer[p.key]) doneP++;
      }
    });
    if (data.habit) doneH++;
  }
  const pR = totalDue > 0 ? Math.round((doneP/totalDue)*100) : 0;
  const hR = Math.round((doneH/todayDate)*100);
  document.getElementById("prayerBar").style.width = pR+"%";
  document.getElementById("prayerPercent").innerText = pR+"%";
  document.getElementById("habitBar").style.width = hR+"%";
  document.getElementById("habitPercent").innerText = hR+"%";
}
</script>
</body>
</html>
